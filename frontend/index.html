<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #ffffff;
    }

    .message-row {
      display: flex;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 75%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 15px;
    }

    .user .bubble {
      background: #111827;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .assistant .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 6px;
    }

    .meta {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .composer-wrapper {
      border-top: 1px solid #e5e7eb;
      padding: 16px 20px 24px;
      background: #ffffff;
    }

    .composer {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    .composer textarea {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 15px;
      min-height: 56px;
      max-height: 180px;
      outline: none;
    }

    .composer textarea:focus {
      border-color: #9ca3af;
    }

    .composer button {
      border: none;
      background: #111827;
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .composer button:hover {
      opacity: 0.92;
    }

    .composer button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome {
      color: #6b7280;
      text-align: center;
      margin-top: auto;
      margin-bottom: auto;
      font-size: 15px;
    }

    .result-block {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    .loading {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .bubble {
        max-width: 88%;
      }

      .header {
        padding: 16px;
      }

      .chat-container {
        padding: 16px;
      }

      .composer-wrapper {
        padding: 12px 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">RAG Chat</div>

    <div id="chatContainer" class="chat-container">
      <div id="welcomeMessage" class="welcome">
        Hacé una pregunta sobre los documentos cargados.
      </div>
    </div>

    <div class="composer-wrapper">
      <div class="composer">
        <textarea
          id="queryInput"
          placeholder="Escribí tu pregunta..."
          rows="1"
        ></textarea>
        <button id="sendButton">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById("chatContainer");
    const queryInput = document.getElementById("queryInput");
    const sendButton = document.getElementById("sendButton");
    const welcomeMessage = document.getElementById("welcomeMessage");

    function autoResizeTextarea() {
      queryInput.style.height = "auto";
      queryInput.style.height = Math.min(queryInput.scrollHeight, 180) + "px";
    }

    queryInput.addEventListener("input", autoResizeTextarea);

    queryInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        search();
      }
    });

    sendButton.addEventListener("click", search);

    function appendMessage(content, role, isHtml = false) {
      if (welcomeMessage) {
        welcomeMessage.style.display = "none";
      }

      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (isHtml) {
        bubble.innerHTML = content;
      } else {
        bubble.textContent = content;
      }

      row.appendChild(bubble);
      chatContainer.appendChild(row);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      return bubble;
    }

    function buildAssistantHtml(results) {
      if (!results || results.length === 0) {
        return "No encontré resultados relevantes.";
      }

      return results
        .map((item, index) => {
          return `
            <div class="result-title">Resultado ${index + 1}</div>
            <div>${item.text}</div>
            <div class="meta">Fuente: ${item.source} · Score: ${item.score.toFixed(4)}</div>
            ${index < results.length - 1 ? '<div class="result-block"></div>' : ""}
          `;
        })
        .join("");
    }

    async function search() {
      const query = queryInput.value.trim();

      if (!query) return;

      appendMessage(query, "user");
      queryInput.value = "";
      autoResizeTextarea();
      sendButton.disabled = true;

      const loadingBubble = appendMessage("Buscando...", "assistant");

      try {
        const response = await fetch(
          `http://127.0.0.1:8000/query?query=${encodeURIComponent(query)}&top_k=3`
        );

        if (!response.ok) {
          throw new Error("Error al consultar la API");
        }

        const data = await response.json();
        loadingBubble.innerHTML = buildAssistantHtml(data.results);
      } catch (error) {
        loadingBubble.textContent = "Hubo un error al consultar la API.";
      } finally {
        sendButton.disabled = false;
      }
    }
  </script>
</body>
</html>
